<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#063500">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='img/icon-192.png') }}">
    <title>Photoop Valiant - QR Foto</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/qrfoto.css') }}">
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <img src="{{ url_for('static', filename='img/heineken_header.png') }}" alt="Logo">
            </div>
        </div>
        <div class="content">
            <h1 class="tittle">Sua foto está pronta</h1>
            <div id="photo-placeholder" class="result-photo photo-placeholder"></div>
            <img id="result-photo" class="result-photo" alt="Foto capturada" hidden>

            <div class="description">
                <h2>Escaneie o QR CODE</h2>
                <h2>para baixar sua foto</h2>
            </div>

            <div class="qr-code">
                <canvas id="qr-code-canvas"></canvas>
            </div>

            <a class="glass-button" id="end-button" href="{{ url_for('obrigado') }}">Finalizar</a>

        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='js/qrfoto.js') }}"></script>
</body>

</html>
