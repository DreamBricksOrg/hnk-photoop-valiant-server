<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photoop Valiant - Sua Foto</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/foto.css') }}">
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <img src="{{ url_for('static', filename='img/heineken_header.png') }}" alt="Logo">
            </div>
        </div>
        <div class="content">
            <div id="photo-placeholder" class="result-photo photo-placeholder"></div>
            <img id="result-photo" class="result-photo" alt="Sua foto" hidden>

            <button class="glass-button" id="download-button">Baixar foto</button>
            <button class="glass-button" id="share-button">Compartilhar</button>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='js/foto.js') }}"></script>
</body>

</html>
