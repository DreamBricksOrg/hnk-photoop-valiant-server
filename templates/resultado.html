<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#063500">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='img/icon-192.png') }}">
    <title>Photoop Valiant - Resultado</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/resultado.css') }}">
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <img src="{{ url_for('static', filename='img/heineken_header.png') }}" alt="Logo">
            </div>
        </div>
        <div class="content">
            <h1 class="tittle">Sua foto ficou assim:</h1>
            <div id="photo-placeholder" class="result-photo photo-placeholder"></div>
            <img id="result-photo" class="result-photo" alt="Foto capturada" hidden>

            <h1 class="tittle">Você gostou?</h1>

            <div class="buttons">
                <a class="glass-button" id="no-button" href="{{ url_for('posicione') }}">Não, tire outra</a>
                <a class="glass-button" id="yes-button">Sim</a>
            </div>
        </div>
    </div>

    <div id="processing-overlay" class="processing-overlay" hidden>
        <div class="spinner"></div>
        <p id="processing-status" class="processing-status">Enviando imagem...</p>
        <div id="processing-error" class="processing-error" hidden>
            <p id="processing-error-message"></p>
            <a class="glass-button" id="retry-button">Tentar novamente</a>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    <script src="{{ url_for('static', filename='js/image-generator.js') }}"></script>
    <script src="{{ url_for('static', filename='js/resultado.js') }}"></script>
</body>

</html>
