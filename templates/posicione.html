<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
    <meta name="theme-color" content="#063500">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='img/icon-192.png') }}">
    <title>Photoop Valiant - Posicione-se</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/posicione.css') }}">
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="logo">
                <img src="{{ url_for('static', filename='img/heineken_header.png') }}" alt="Logo">
            </div>
        </div>
        <div class="content">
            
            <h1 class="tittle">Posicione-se</h1>

            <div class="camera-container">
                <video id="camera-stream" autoplay playsinline></video>
                <canvas id="photo-canvas"></canvas>
            </div>

            <div class="description">
                <h2>Enquadre-se na área indicada</h2>
            </div>

            <div class="capture-button">
                <button class="glass-button" id="capture-button">Capturar foto</button>
            </div>

            <a href="{{ url_for('index') }}"><h2 class="button-cancel">Cancelar</h2></a>

        </div>

        <div id="countdown-overlay" class="countdown-overlay" hidden>
            <span id="countdown-number" class="countdown-number"></span>
        </div>

        <script src="{{ url_for('static', filename='js/main.js') }}"></script>
        <script src="{{ url_for('static', filename='js/posicione.js') }}"></script>
</body>

</html>
